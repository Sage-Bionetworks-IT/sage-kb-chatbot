name: test

on:
  workflow_call:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --all-extras --frozen
      - name: Run tests
        run: uv run pytest --cov -q
