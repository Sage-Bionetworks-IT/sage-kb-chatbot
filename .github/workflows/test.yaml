name: test

on:
  workflow_call:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v6
      - name: Set up Python
        run: uv python install
      - name: Install dependencies
        run: uv sync --all-extras --frozen
      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1
